<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Catatan Keuangan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f4f8;
            --card: #ffffff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --muted: #6b7280;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --edit-bg: #fef3c7;
            --edit-text: #92400e;
            --radius: 12px;
            --gap: 20px;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.04), 0 2px 4px rgba(0, 0, 0, 0.02);
            --shadow-hover: 0 8px 20px rgba(0, 0, 0, 0.06);
            --transition: 0.2s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #eef2f6 0%, #f8fafc 100%);
            min-height: 100vh;
            padding: 32px 20px;
            display: flex;
            justify-content: center;
            color: #1e293b;
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: 1120px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }

        h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #0f172a;
        }

        .muted-small {
            font-size: 13px;
            color: var(--muted);
            background: #f1f5f9;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 500;
        }

        #userTag {
            margin-left: auto;
        }

        .row {
            display: flex;
            gap: var(--gap);
            flex-wrap: wrap;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            transition: box-shadow var(--transition);
            border: 1px solid #f1f5f9;
        }

        .card:hover {
            box-shadow: var(--shadow-hover);
        }

        .wide {
            flex: 1 1 400px;
        }

        .narrow {
            flex: 1.2 1 480px;
            display: flex;
            flex-direction: column;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 6px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: #fff;
            font-size: 14px;
            font-family: inherit;
            transition: border 0.15s, box-shadow 0.15s;
            outline: none;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        textarea {
            min-height: 90px;
            resize: vertical;
        }

        button {
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            font-size: 14px;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border-radius: 8px;
            border: none;
        }

        button.primary {
            background: var(--primary);
            color: #fff;
            padding: 10px 18px;
            box-shadow: 0 1px 3px rgba(37, 99, 235, 0.3);
        }

        button.primary:hover {
            background: var(--primary-hover);
            box-shadow: 0 4px 8px rgba(37, 99, 235, 0.25);
            transform: translateY(-1px);
        }

        button.ghost {
            background: #f8fafc;
            color: #334155;
            padding: 10px 16px;
            border: 1px solid #e2e8f0;
        }

        button.ghost:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }

        button.edit {
            background: var(--edit-bg);
            color: var(--edit-text);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
        }

        button.edit:hover {
            background: #fde68a;
        }

        button.del {
            background: #fee2e2;
            color: #b91c1c;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
        }

        button.del:hover {
            background: #fecaca;
            color: #991b1b;
        }

        .totals {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .totals .box {
            flex: 1;
            padding: 16px 12px;
            border-radius: var(--radius);
            background: #f8fafc;
            text-align: center;
            border: 1px solid #f1f5f9;
            transition: background var(--transition);
        }

        .totals .box h3 {
            margin: 0 0 4px;
            font-size: 18px;
            font-weight: 600;
            color: #0f172a;
            word-break: break-word;
        }

        .totals .box .muted-small {
            background: transparent;
            padding: 0;
            color: #64748b;
            font-weight: 400;
        }

        .data-wrapper {
            max-height: 380px;
            overflow-y: auto;
            border-radius: var(--radius);
            background: #fff;
            border: 1px solid #f1f5f9;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 #f8fafc;
        }

        .data-wrapper::-webkit-scrollbar {
            width: 6px;
        }

        .data-wrapper::-webkit-scrollbar-track {
            background: #f8fafc;
            border-radius: 8px;
        }

        .data-wrapper::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 8px;
        }

        .list {
            padding: 8px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid #f1f5f9;
            margin-bottom: 8px;
            align-items: flex-start;
            background: #fff;
            transition: all var(--transition);
            box-shadow: var(--shadow-sm);
        }

        .item:hover {
            background: #fafbfc;
            border-color: #e2e8f0;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.03);
        }

        .item:last-child {
            margin-bottom: 0;
        }

        .item .content {
            flex: 1;
            min-width: 0;
        }

        .item .header-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
        }

        .item .header-row strong {
            font-size: 15px;
            color: #0f172a;
        }

        .item .tanggal {
            font-size: 12px;
            color: #94a3b8;
            white-space: nowrap;
        }

        .item .deskripsi {
            font-size: 13px;
            color: #64748b;
            margin-top: 6px;
            word-break: break-word;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            align-self: center;
        }

        .status-area {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .status-area strong {
            font-size: 14px;
            color: #334155;
        }

        #statusMsg {
            font-size: 13px;
            color: #475569;
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 12px;
            margin: 0;
        }

        #spinner {
            font-size: 13px;
            color: var(--primary);
            font-weight: 500;
            align-self: center;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            background: #1e293b;
            color: #fff;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            z-index: 9999;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(2px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9998;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: #fff;
            padding: 28px 24px;
            border-radius: 16px;
            max-width: 360px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .modal p {
            font-size: 15px;
            color: #1e293b;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal-buttons button {
            min-width: 100px;
        }

        .center {
            display: flex;
            justify-content: center;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 820px) {
            .row {
                flex-direction: column;
            }

            .wide,
            .narrow {
                width: 100%;
                flex: auto;
            }

            .totals {
                flex-direction: column;
            }

            .totals .box {
                text-align: left;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .item .header-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .actions {
                align-self: flex-end;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 16px 12px;
            }

            h1 {
                font-size: 22px;
            }

            .card {
                padding: 18px;
            }

            .item {
                flex-direction: column;
            }

            .actions {
                align-self: flex-end;
                margin-top: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Catatan Keuangan</h1>
            <div id="userTag" class="muted-small"></div>
        </header>

        <div class="row">
            <!-- Form Input -->
            <div class="card wide">
                <form id="form">
                    <input type="hidden" id="noteId" />
                    <div style="display: flex; gap: 12px; flex-wrap: wrap">
                        <div style="flex: 1; min-width: 150px">
                            <label for="tanggal">Tanggal</label>
                            <input id="tanggal" type="date" required />
                        </div>
                        <div style="flex: 1; min-width: 150px">
                            <label for="jenis">Jenis</label>
                            <select id="jenis" required>
                                <option value="">Pilih Jenis</option>
                                <option value="Pemasukan">📈 Pemasukan</option>
                                <option value="Pengeluaran">📉 Pengeluaran</option>
                            </select>
                        </div>
                        <div style="flex: 1; min-width: 150px">
                            <label for="jumlah">Jumlah (Rp)</label>
                            <input id="jumlah" type="number" placeholder="0" required min="0" />
                        </div>
                    </div>
                    <div style="margin-top: 16px">
                        <label for="deskripsi">Deskripsi</label>
                        <textarea id="deskripsi" placeholder="Tulis catatan singkat..."></textarea>
                    </div>
                    <div style="margin-top: 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap">
                        <button class="primary" type="submit" id="btnSave">💾 Simpan</button>
                        <button type="button" id="btnReset" class="ghost">↺ Reset</button>
                        <span id="spinner" style="margin-left: auto; display: none;">⏳ Memproses...</span>
                    </div>
                </form>
                <div class="status-area">
                    <strong>Status:</strong>
                    <span id="statusMsg">—</span>
                    <button id="btnRefresh" class="ghost" style="margin-left: auto;">🔄 Refresh</button>
                </div>
            </div>

            <!-- Ringkasan & List -->
            <div class="card narrow">
                <div class="totals">
                    <div class="box">
                        <h3 id="totalIn">Rp 0</h3>
                        <div class="muted-small">Total Pemasukan</div>
                    </div>
                    <div class="box">
                        <h3 id="totalOut">Rp 0</h3>
                        <div class="muted-small">Total Pengeluaran</div>
                    </div>
                    <div class="box">
                        <h3 id="saldo">Rp 0</h3>
                        <div class="muted-small">Saldo</div>
                    </div>
                </div>
                <div class="data-wrapper">
                    <div id="list" class="list"></div>
                </div>
                <div id="listContainer" class="hidden"></div> <!-- tetap dipertahankan untuk kompatibilitas -->
            </div>
        </div>
    </div>

    <!-- Toast & Modal -->
    <div id="toast" class="toast"></div>
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal">
            <p id="modalMsg">Apakah Anda yakin?</p>
            <div class="modal-buttons">
                <button id="modalNo" class="ghost">Batal</button>
                <button id="modalYes" class="primary">Ya, lanjutkan</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzMfyB836C6JYzAWFQ4zBA45fsUKiLXHL2j8cdqLOfxM-r7rdlhfV_yDfFGUf_S6dXoNg/exec";
        const params = new URLSearchParams(window.location.search);
        const userId = params.get("id")?.trim()?.toUpperCase();

        const userTag = document.getElementById("userTag");
        const statusMsg = document.getElementById("statusMsg");
        const spinner = document.getElementById("spinner");
        const toast = document.getElementById("toast");
        const modalOverlay = document.getElementById("modalOverlay");
        const modalMsg = document.getElementById("modalMsg");
        const modalYes = document.getElementById("modalYes");
        const modalNo = document.getElementById("modalNo");

        if (!userId) {
            document.body.innerHTML = "<div style='padding:40px;text-align:center;color:#b91c1c'><h2>ID user tidak ditemukan. Tambahkan ?id=YOURID pada URL</h2></div>";
            throw new Error("User ID missing");
        }
        userTag.textContent = "👤 " + userId;

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 2500);
        }

        function customConfirm(message) {
            return new Promise(resolve => {
                modalMsg.textContent = message;
                modalOverlay.classList.add("show");
                modalYes.onclick = () => { modalOverlay.classList.remove("show"); resolve(true); };
                modalNo.onclick = () => { modalOverlay.classList.remove("show"); resolve(false); };
            });
        }

        function formatRp(n) { return "Rp " + (Number(n) || 0).toLocaleString('id-ID'); }
        function showStatus(t) { statusMsg.textContent = t; }

        async function apiPost(data) {
            spinner.style.display = "inline-block";
            try {
                const res = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(data) });
                const j = await res.json();
                spinner.style.display = "none";
                return j;
            } catch (err) {
                spinner.style.display = "none";
                showStatus("Gagal kirim: " + err.message);
                throw err;
            }
        }

        async function apiGet() {
            spinner.style.display = "inline-block";
            try {
                const url = `${SCRIPT_URL}?idUser=${encodeURIComponent(userId)}&ts=${Date.now()}`;
                const res = await fetch(url);
                const j = await res.json();
                spinner.style.display = "none";
                return j;
            } catch (err) {
                spinner.style.display = "none";
                showStatus("Gagal ambil: " + err.message);
                throw err;
            }
        }

        async function loadData() {
            showStatus("Mengambil data...");
            const r = await apiGet();
            if (r.status === "success") {
                renderList(r.data || []);
                showStatus("✅ Data terbaru");
            } else {
                document.getElementById("list").innerHTML = "<div class='muted-small' style='padding:16px;text-align:center'>Gagal mengambil data</div>";
            }
        }

        const form = document.getElementById("form");
        const noteId = document.getElementById("noteId");
        const tanggal = document.getElementById("tanggal");
        const jenis = document.getElementById("jenis");
        const jumlah = document.getElementById("jumlah");
        const deskripsi = document.getElementById("deskripsi");
        const listEl = document.getElementById("list");
        const totalIn = document.getElementById("totalIn");
        const totalOut = document.getElementById("totalOut");
        const saldoEl = document.getElementById("saldo");
        const btnRefresh = document.getElementById("btnRefresh");
        const btnReset = document.getElementById("btnReset");
        const btnSave = document.getElementById("btnSave");

        function renderList(data) {
            listEl.innerHTML = "";
            if (!data || data.length === 0) {
                listEl.innerHTML = "<div class='muted-small' style='padding:24px;text-align:center'>📭 Belum ada catatan</div>";
                totalIn.textContent = formatRp(0);
                totalOut.textContent = formatRp(0);
                saldoEl.textContent = formatRp(0);
                return;
            }

            let inTotal = 0, outTotal = 0;
            data.forEach(item => {
                const jml = Number(item.jumlah) || 0;
                if (item.jenis.toLowerCase() === "pemasukan") inTotal += jml;
                else outTotal += jml;
            });

            totalIn.textContent = formatRp(inTotal);
            totalOut.textContent = formatRp(outTotal);
            saldoEl.textContent = formatRp(inTotal - outTotal);

            data.forEach(item => {
                const node = document.createElement("div");
                node.className = "item";
                node.innerHTML = `
                    <div class="content">
                        <div class="header-row">
                            <strong>${item.jenis === "Pemasukan" ? "📈" : "📉"} ${item.jenis} • ${formatRp(item.jumlah)}</strong>
                            <span class="tanggal">📅 ${item.tanggal}</span>
                        </div>
                        <div class="deskripsi">${item.deskripsi || "—"}</div>
                    </div>
                    <div class="actions">
                        <button class="edit">✏️ Edit</button>
                        <button class="del">🗑️ Hapus</button>
                    </div>`;
                node.querySelector(".edit").addEventListener("click", () => {
                    noteId.value = item.idCatatan;
                    tanggal.value = item.tanggal;
                    jenis.value = item.jenis;
                    jumlah.value = item.jumlah;
                    deskripsi.value = item.deskripsi || "";
                    btnSave.textContent = "📝 Update";
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
                node.querySelector(".del").addEventListener("click", async () => {
                    const ok = await customConfirm("Hapus catatan ini?");
                    if (!ok) return;
                    await apiPost({ action: "deleteCatatan", idUser: userId, idCatatan: item.idCatatan });
                    showToast("🗑️ Catatan dihapus");
                    loadData();
                });
                listEl.appendChild(node);
            });
        }

        form.addEventListener("submit", async (ev) => {
            ev.preventDefault();
            const data = {
                action: noteId.value ? "updateCatatan" : "createCatatan",
                idUser: userId,
                tanggal: tanggal.value,
                jenis: jenis.value,
                jumlah: Number(jumlah.value),
                deskripsi: deskripsi.value
            };
            if (noteId.value) data.idCatatan = noteId.value;
            await apiPost(data);
            form.reset();
            noteId.value = "";
            btnSave.textContent = "💾 Simpan";
            showToast("✅ Catatan berhasil disimpan");
            loadData();
        });

        btnRefresh.addEventListener("click", loadData);
        btnReset.addEventListener("click", () => {
            form.reset();
            noteId.value = "";
            btnSave.textContent = "💾 Simpan";
            showToast("↺ Form direset");
        });

        // Inisialisasi
        loadData();
    </script>
</body>
</html>
